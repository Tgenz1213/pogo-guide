name: Main Preflight and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  queue-e2e-changes:
    runs-on: ubuntu-latest
    outputs:
      queue_e2e: ${{ steps.filter.outputs.queue_e2e }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
        with:
          fetch-depth: 0
      - id: filter
        name: Detect queue E2E relevant changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              FILES=$(git ls-files)
            else
              FILES=$(git diff --name-only "$BEFORE" "$AFTER")
            fi
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              FILES=$(git diff --name-only HEAD~1 HEAD)
            else
              FILES=$(git ls-files)
            fi
          fi

          echo "$FILES" | grep -E '^(packages/queue-consumer/|packages/shared-utils/|web/server/api/submit-guide.post.ts$|web/wrangler\.test\.jsonc$|web/wrangler\.jsonc$)' >/dev/null && MATCHED=true || MATCHED=false

          echo "queue_e2e=$MATCHED" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Knip
        run: pnpm run knip
      - name: Run Typecheck
        run: pnpm run typecheck
      - name: Run Lint
        run: pnpm run lint

  web-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Web UI tests
        run: pnpm --filter web run test:ui

  web-server-integration:
    runs-on: ubuntu-latest
    env:
      PREVIEW_DB_ID: ${{ vars.PREVIEW_DB_ID }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify test DB points to preview DB
        shell: bash
        run: |
          PROD_DB_ID=$(grep -m1 '"database_id"' web/wrangler.jsonc | sed -E 's/.*"database_id": "([^"]+)".*/\1/')
          TEST_DB_ID=$(grep -m1 '"database_id"' web/wrangler.test.jsonc | sed -E 's/.*"database_id": "([^"]+)".*/\1/')
          if [ "$PROD_DB_ID" = "$TEST_DB_ID" ]; then
            echo "Test DB must not match production DB"
            exit 1
          fi
          if [ "$PREVIEW_DB_ID" != "$TEST_DB_ID" ]; then
            echo "Test DB must match preview DB"
            exit 1
          fi
      - name: Apply migrations to preview DB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter web exec wrangler d1 migrations apply DB --config wrangler.test.jsonc --remote
      - name: Run Web server integration tests
        run: pnpm --filter web run test:server:ci

  web-e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: pnpm --filter web run test:e2e:smoke

  queue-consumer-sanity-preview-integration:
    runs-on: ubuntu-latest
    needs: [queue-e2e-changes]
    if: needs.queue-e2e-changes.outputs.queue_e2e == 'true'
    env:
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: preview
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run queue consumer preview integration test
        run: pnpm --filter queue-consumer run test:integration

  queue-preview-e2e:
    runs-on: ubuntu-latest
    needs: [queue-e2e-changes]
    if: needs.queue-e2e-changes.outputs.queue_e2e == 'true' && vars.SANITY_PROJECT_ID != '' && vars.PREVIEW_WEB_BASE_URL != ''
    # Serialized with the equivalent job in pr.yaml (same group name): both
    # provision secrets onto the single, persistently-named pogo-guide-test
    # worker, and a concurrent run rotating those secrets mid-test would
    # produce intermittent, hard-to-diagnose failures in the other run.
    concurrency:
      group: preview-worker-secrets
      cancel-in-progress: false
    env:
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: preview
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
      PREVIEW_WEB_BASE_URL: ${{ vars.PREVIEW_WEB_BASE_URL }}
      PREVIEW_WEB_FALLBACK_BASE_URL: ${{ vars.PREVIEW_WEB_FALLBACK_BASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      E2E_LOGIN_TOKEN: ${{ secrets.E2E_LOGIN_TOKEN }}
      PREVIEW_SESSION_PASSWORD: ${{ secrets.PREVIEW_SESSION_PASSWORD }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
      - name: Verify required preview secrets are configured
        run: |
          if [ -z "$E2E_LOGIN_TOKEN" ] || [ -z "$PREVIEW_SESSION_PASSWORD" ]; then
            echo "::error::E2E_LOGIN_TOKEN and/or PREVIEW_SESSION_PASSWORD are not configured -- queue-preview-e2e cannot run without them."
            exit 1
          fi
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0
      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy preview web producer
        run: pnpm --filter web run deploy:cloudflare:preview
      - name: Provision preview auth secrets
        working-directory: web
        run: |
          echo "$PREVIEW_SESSION_PASSWORD" | pnpm exec wrangler secret put NUXT_SESSION_PASSWORD --config wrangler.test.jsonc
          echo "$E2E_LOGIN_TOKEN" | pnpm exec wrangler secret put NUXT_E2E_LOGIN_TOKEN --config wrangler.test.jsonc
      - name: Deploy preview queue consumer
        run: pnpm --filter queue-consumer run deploy:preview
      - name: Run preview queue E2E test
        run: pnpm --filter queue-consumer run test:e2e:queue
  deploy:
    runs-on: ubuntu-latest
    needs:
      [
        quality,
        web-ui-tests,
        web-server-integration,
        web-e2e-smoke,
        queue-consumer-sanity-preview-integration,
        queue-preview-e2e,
      ]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    environment: production
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.13.0

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to production DB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter web exec wrangler d1 migrations apply DB --remote

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter web run deploy:cloudflare

      - name: Deploy Queue Consumer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter queue-consumer run deploy
