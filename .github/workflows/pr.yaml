name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  queue-e2e-changes:
    runs-on: ubuntu-latest
    outputs:
      queue_e2e: ${{ steps.filter.outputs.queue_e2e }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
        with:
          fetch-depth: 0

      - id: filter
        name: Detect queue E2E relevant changes
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          if git rev-parse --verify "$BASE_SHA" >/dev/null 2>&1 && git rev-parse --verify "$HEAD_SHA" >/dev/null 2>&1; then
            FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            FILES=$(git ls-files)
          fi

          echo "$FILES" | grep -E '^(packages/queue-consumer/|packages/shared-utils/|web/server/api/submit-guide.post.ts$|web/wrangler\.test\.jsonc$|web/wrangler\.jsonc$)' >/dev/null && MATCHED=true || MATCHED=false

          echo "queue_e2e=$MATCHED" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Knip
        run: pnpm run knip

      - name: Run Typecheck
        run: pnpm run typecheck

      - name: Run Lint
        run: pnpm run lint

  web-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web UI tests
        run: pnpm --filter web run test:ui

  web-server-integration:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      PREVIEW_DB_ID: ${{ vars.PREVIEW_DB_ID }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify test DB points to preview DB
        shell: bash
        run: |
          PROD_DB_ID=$(grep -m1 '"database_id"' web/wrangler.jsonc | sed -E 's/.*"database_id": "([^"]+)".*/\1/')
          TEST_DB_ID=$(grep -m1 '"database_id"' web/wrangler.test.jsonc | sed -E 's/.*"database_id": "([^"]+)".*/\1/')

          if [ "$PROD_DB_ID" = "$TEST_DB_ID" ]; then
            echo "Test DB must not match production DB"
            exit 1
          fi

          if [ "$PREVIEW_DB_ID" != "$TEST_DB_ID" ]; then
            echo "Test DB must match preview DB"
            exit 1
          fi

      - name: Apply migrations to preview DB
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply DB --config wrangler.test.jsonc --remote

      - name: Run Web server integration tests
        run: pnpm --filter web run test:server:ci

  web-e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm --filter web run test:e2e:smoke

  queue-consumer-sanity-preview-integration:
    runs-on: ubuntu-latest
    needs: [queue-e2e-changes]
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && needs.queue-e2e-changes.outputs.queue_e2e == 'true' }}
    env:
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: preview
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run queue consumer preview integration test
        run: pnpm --filter queue-consumer run test:integration

  queue-preview-e2e:
    runs-on: ubuntu-latest
    needs: [queue-e2e-changes]
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && needs.queue-e2e-changes.outputs.queue_e2e == 'true' && vars.SANITY_PROJECT_ID != '' && vars.PREVIEW_WEB_BASE_URL != '' }}
    env:
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: preview
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
      PREVIEW_WEB_BASE_URL: ${{ vars.PREVIEW_WEB_BASE_URL }}
      PREVIEW_WEB_FALLBACK_BASE_URL: ${{ vars.PREVIEW_WEB_FALLBACK_BASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview web producer
        run: pnpm --filter web run deploy:cloudflare:preview

      - name: Deploy preview queue consumer
        run: pnpm --filter queue-consumer run deploy:preview

      - name: Run preview queue E2E test
        run: pnpm --filter queue-consumer run test:e2e:queue

  build-web:
    runs-on: ubuntu-latest
    needs: [quality, web-ui-tests, web-server-integration, web-e2e-smoke, queue-consumer-sanity-preview-integration, queue-preview-e2e]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter web run build
